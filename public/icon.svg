<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#16a34a"/>

  <!-- Split fork: one input splits into two outputs -->
  <!-- Left dot (single expense) -->
  <circle cx="11" cy="32" r="4.5" fill="white"/>

  <!-- Stem -->
  <line x1="15" y1="32" x2="29" y2="32" stroke="white" stroke-width="5" stroke-linecap="round"/>

  <!-- Upper branch -->
  <line x1="29" y1="32" x2="47" y2="18" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <!-- Upper arrowhead -->
  <polyline points="41,15 47,18 44,25" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Lower branch -->
  <line x1="29" y1="32" x2="47" y2="46" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <!-- Lower arrowhead -->
  <polyline points="41,49 47,46 44,39" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
